services:
  db:
    image: postgres:16-alpine
    container_name: kmt-legal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kmt_legal
      POSTGRES_USER: kmt_legal
      POSTGRES_PASSWORD: kmt_legal_dev_password
    ports:
      - "5432:5432"
    volumes:
      - kmt_legal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmt_legal -d kmt_legal"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  kmt_legal_postgres_data:
